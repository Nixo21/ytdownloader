<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MaNiLoader — YouTube Downloader</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#08080f;--purple:#7c3aed;--purple-l:#a78bfa;--pink:#c026d3;
  --glass-bg:rgba(124,58,237,0.06);--glass-bd:rgba(124,58,237,0.25);
  --text:#ede9fe;--muted:#6b7280;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Exo 2',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
#cvs{position:fixed;inset:0;z-index:0;pointer-events:none;}
.blob{position:fixed;border-radius:50%;filter:blur(130px);opacity:.13;pointer-events:none;z-index:0;}
.b1{width:800px;height:800px;background:radial-gradient(#7c3aed,transparent 70%);top:-350px;left:-250px;animation:bd 26s ease-in-out infinite alternate;}
.b2{width:650px;height:650px;background:radial-gradient(#c026d3,transparent 70%);bottom:-250px;right:-200px;animation:bd 32s ease-in-out infinite alternate-reverse;}
.b3{width:450px;height:450px;background:radial-gradient(#4f46e5,transparent 70%);top:40%;left:60%;animation:bd 21s ease-in-out infinite alternate;}
@keyframes bd{0%{transform:translate(0,0) scale(1);}100%{transform:translate(35px,25px) scale(1.12);}}
.wrap{position:relative;z-index:10;max-width:800px;margin:0 auto;padding:60px 24px 90px;}
header{text-align:center;margin-bottom:52px;animation:fdown .8s ease both;}
.logo-row{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:12px;}
.logo-icon{width:54px;height:54px;border-radius:14px;overflow:hidden;flex-shrink:0;box-shadow:0 0 30px rgba(124,58,237,.6);animation:pglow 3s ease-in-out infinite;background:linear-gradient(135deg,#7c3aed,#c026d3);display:flex;align-items:center;justify-content:center;}
.logo-icon img{width:100%;height:100%;object-fit:contain;display:block;}
@keyframes pglow{0%,100%{box-shadow:0 0 25px rgba(124,58,237,.5);}50%{box-shadow:0 0 55px rgba(192,38,211,.75);}}
h1{font-family:'Orbitron',monospace;font-size:clamp(30px,6vw,52px);font-weight:900;letter-spacing:4px;background:linear-gradient(90deg,var(--purple-l),#fff 50%,var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.tagline{color:var(--muted);font-size:13px;letter-spacing:2px;text-transform:uppercase;margin-top:6px;}
.card{background:var(--glass-bg);border:1px solid var(--glass-bd);border-radius:22px;padding:36px;backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);box-shadow:0 8px 48px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.06);animation:fup .8s .2s ease both;}
@keyframes fup{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:none}}
@keyframes fdown{from{opacity:0;transform:translateY(-18px)}to{opacity:1;transform:none}}
.igroup{display:flex;gap:10px;margin-bottom:28px;}
.urlinput{flex:1;background:rgba(0,0,0,.45);border:1px solid var(--glass-bd);border-radius:12px;padding:14px 18px;color:var(--text);font-family:'Exo 2',sans-serif;font-size:15px;outline:none;transition:border-color .3s,box-shadow .3s;}
.urlinput::placeholder{color:var(--muted);}
.urlinput:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(124,58,237,.18);}
.btn-scan{background:linear-gradient(135deg,#7c3aed,#c026d3);color:#fff;border:none;border-radius:12px;padding:14px 22px;font-family:'Orbitron',monospace;font-size:12px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all .3s;white-space:nowrap;box-shadow:0 4px 20px rgba(124,58,237,.35);}
.btn-scan:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(124,58,237,.55);}
.btn-scan:disabled{opacity:.45;cursor:not-allowed;transform:none;}
.sbar{display:none;align-items:center;gap:12px;background:rgba(124,58,237,.08);border:1px solid rgba(124,58,237,.25);border-radius:10px;padding:14px 18px;margin-bottom:22px;font-size:14px;}
.sbar.on{display:flex;}
.spin{width:18px;height:18px;flex-shrink:0;border:2px solid rgba(124,58,237,.2);border-top-color:var(--purple-l);border-radius:50%;animation:sp .8s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}
.vinfo{display:none;gap:18px;margin-bottom:26px;}
.vinfo.on{display:flex;}
.thumb{flex-shrink:0;width:140px;height:88px;border-radius:10px;overflow:hidden;border:1px solid var(--glass-bd);background:rgba(0,0,0,.4);position:relative;}
.thumb img{width:100%;height:100%;object-fit:cover;}
.sbadge{display:none;position:absolute;top:5px;right:5px;background:linear-gradient(135deg,#ef4444,#f97316);color:#fff;font-family:'Orbitron',monospace;font-size:9px;font-weight:700;padding:3px 7px;border-radius:20px;}
.vmeta{flex:1;min-width:0;}
.vtitle{font-weight:600;font-size:15px;line-height:1.4;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.tags{display:flex;gap:8px;flex-wrap:wrap;}
.tag{background:rgba(124,58,237,.1);border:1px solid rgba(124,58,237,.25);border-radius:20px;padding:3px 12px;font-size:12px;color:var(--purple-l);font-family:'Orbitron',monospace;letter-spacing:.5px;}
.tag.sh{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.3);color:#f87171;}
.tag.dur{background:rgba(255,215,0,.06);border-color:rgba(255,215,0,.2);color:#fde68a;}
.slabel{font-family:'Orbitron',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.slabel::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(124,58,237,.3),transparent);}
.qsec{display:none;}
.qsec.on{display:block;animation:fup .5s ease both;}
.fmts{display:flex;gap:8px;margin-bottom:22px;}
.fbtn{flex:1;background:rgba(0,0,0,.3);border:1px solid var(--glass-bd);border-radius:10px;padding:10px;color:var(--muted);font-family:'Exo 2',sans-serif;font-size:13px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:7px;}
.fbtn.act{background:rgba(124,58,237,.12);border-color:var(--purple);color:var(--purple-l);box-shadow:0 0 14px rgba(124,58,237,.2);}
.qgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:22px;}
.qbtn{background:rgba(0,0,0,.3);border:1px solid var(--glass-bd);border-radius:12px;padding:14px 10px;cursor:pointer;transition:all .25s;text-align:center;position:relative;overflow:hidden;}
.qbtn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,#7c3aed,#c026d3);opacity:0;transition:opacity .25s;}
.qbtn:hover{border-color:var(--purple);transform:translateY(-3px);box-shadow:0 8px 24px rgba(124,58,237,.25);}
.qbtn.sel{border-color:var(--purple);box-shadow:0 0 22px rgba(124,58,237,.35);}
.qbtn.sel::before{opacity:.1;}
.qi{position:relative;z-index:1;}
.qr{font-family:'Orbitron',monospace;font-size:17px;font-weight:700;color:var(--text);display:block;margin-bottom:3px;}
.ql{font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;display:block;}
.qb{display:inline-block;font-size:9px;font-family:'Orbitron',monospace;padding:2px 6px;border-radius:4px;margin-top:5px;letter-spacing:.5px;}
.qb.hdr{background:rgba(255,215,0,.1);color:#fde68a;border:1px solid rgba(255,215,0,.3);}
.qb.hd{background:rgba(124,58,237,.15);color:var(--purple-l);border:1px solid rgba(124,58,237,.3);}
.qb.sd{background:rgba(100,100,100,.1);color:#9ca3af;border:1px solid rgba(100,100,100,.2);}
.dlbtn{width:100%;background:linear-gradient(135deg,#180a2e,#1e0a30);border:1px solid var(--purple);border-radius:14px;padding:18px;color:var(--purple-l);font-family:'Orbitron',monospace;font-size:14px;font-weight:700;letter-spacing:2px;cursor:pointer;transition:all .3s;display:none;align-items:center;justify-content:center;gap:12px;position:relative;overflow:hidden;}
.dlbtn::before{content:'';position:absolute;inset:-2px;background:linear-gradient(135deg,#7c3aed,#c026d3,#7c3aed);background-size:200%;border-radius:16px;z-index:-1;animation:gs 3s linear infinite;opacity:0;transition:opacity .3s;}
.dlbtn:hover::before{opacity:1;}
.dlbtn:hover{color:#fff;transform:translateY(-2px);box-shadow:0 10px 40px rgba(124,58,237,.4);}
.dlbtn.on{display:flex;}
@keyframes gs{0%{background-position:0%}100%{background-position:200%}}
.prog{display:none;margin-top:18px;}
.prog.on{display:block;animation:fup .4s ease both;}
.ptrack{height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;margin-bottom:10px;}
.pfill{height:100%;width:0%;border-radius:3px;background:linear-gradient(90deg,#7c3aed,#c026d3);transition:width .3s ease;box-shadow:0 0 12px rgba(124,58,237,.5);position:relative;}
.pfill::after{content:'';position:absolute;right:0;top:0;width:18px;height:100%;background:white;border-radius:3px;opacity:.4;filter:blur(4px);}
.ptxt{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);font-family:'Orbitron',monospace;}
.pills{display:flex;gap:10px;flex-wrap:wrap;margin-top:24px;padding-top:22px;border-top:1px solid rgba(124,58,237,.12);}
.pill{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:20px;padding:5px 13px;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--purple-l);}
.note{margin-top:28px;text-align:center;font-size:12px;color:var(--muted);animation:fup .8s .5s ease both;}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-thumb{background:rgba(124,58,237,.3);border-radius:3px;}
</style>
</head>
<body>
<div class="blob b1"></div>
<div class="blob b2"></div>
<div class="blob b3"></div>
<canvas id="cvs"></canvas>

<div class="wrap">
  <header>
    <div class="logo-row">
      <div class="logo-icon">
        <img src="img/logo.png" alt="logo" onerror="this.style.display='none';this.parentElement.innerHTML='🚀';">
      </div>
      <h1>MaNiLoader</h1>
    </div>
    <p class="tagline">YouTube Downloader &nbsp;·&nbsp; By MaNiBot</p>
  </header>

  <div class="card">
    <div class="igroup">
      <input type="text" class="urlinput" id="urlInput" placeholder="Wklej link YouTube (video lub Shorts)…"/>
      <button class="btn-scan" id="scanBtn" onclick="analyzeVideo()">SKANUJ</button>
    </div>
    <div class="sbar" id="sbar"><div class="spin"></div><span id="stxt">Analizuję…</span></div>
    <div class="vinfo" id="vinfo">
      <div class="thumb"><img id="thumbImg" src="" alt=""/><span class="sbadge" id="sbadge">SHORTS</span></div>
      <div class="vmeta"><div class="vtitle" id="vtitle"></div><div class="tags" id="vtags"></div></div>
    </div>
    <div class="qsec" id="qsec">
      <div class="slabel">Format</div>
      <div class="fmts">
        <button class="fbtn act" data-fmt="mp4" onclick="selFmt(this)">🎬 MP4</button>
        <button class="fbtn" data-fmt="mp3" onclick="selFmt(this)">🎵 MP3</button>
        <button class="fbtn" data-fmt="webm" onclick="selFmt(this)">⚙️ WebM</button>
      </div>
      <div class="slabel" id="qlabel">Rozdzielczość</div>
      <div class="qgrid" id="qgrid"></div>
      <button class="dlbtn" id="dlbtn" onclick="startDownload()">⬇ POBIERZ</button>
      <div class="prog" id="prog">
        <div class="ptrack"><div class="pfill" id="pfill"></div></div>
        <div class="ptxt"><span id="plabel">Pobieranie…</span><span id="ppct">0%</span></div>
      </div>
    </div>
    <div class="pills">
      <div class="pill"><div class="dot"></div>Shorts wykrywane auto</div>
      <div class="pill"><div class="dot" style="background:#f472b6"></div>Do 4K HDR</div>
      <div class="pill"><div class="dot" style="background:#fde68a"></div>MP3 320kbps</div>
    </div>
  </div>
  <p class="note" id="note">⏳ Łączę z backendem…</p>
</div>

<script>
// ══ STARS ══
const cvs = document.getElementById('cvs');
const ctx = cvs.getContext('2d');
let layers = [];

function resize() {
  cvs.width  = window.innerWidth;
  cvs.height = window.innerHeight;
}
window.addEventListener('resize', function() { resize(); buildLayers(); });
resize();

var COLS = [
  [255,255,255],[167,139,250],[139,120,255],[196,181,253],[220,200,255],[140,180,255]
];

function makeLayer(n, vy, rMin, rMax, driftMax) {
  var arr = [];
  for (var i = 0; i < n; i++) {
    var c = COLS[Math.floor(Math.random() * COLS.length)];
    arr.push({
      x: Math.random() * cvs.width,
      y: Math.random() * cvs.height,
      r: rMin + Math.random() * (rMax - rMin),
      a: 0.2 + Math.random() * 0.8,
      phase: Math.random() * Math.PI * 2,
      tw: 0.002 + Math.random() * 0.006,
      drift: (Math.random() - 0.5) * driftMax,
      vy: -vy * (0.5 + Math.random()),
      col: c
    });
  }
  return arr;
}

function buildLayers() {
  layers = [
    makeLayer(200, 0.015, 0.3, 0.9, 0.05),
    makeLayer(120, 0.04,  0.5, 1.5, 0.2),
    makeLayer(60,  0.09,  0.8, 2.2, 0.55)
  ];
}
buildLayers();

function drawStars() {
  ctx.clearRect(0, 0, cvs.width, cvs.height);
  var t = Date.now() * 0.001;
  for (var li = 0; li < layers.length; li++) {
    var layer = layers[li];
    for (var i = 0; i < layer.length; i++) {
      var s = layer[i];
      s.y += s.vy;
      s.x += s.drift;
      if (s.y < -2) s.y = cvs.height + 2;
      if (s.y > cvs.height + 2) s.y = -2;
      if (s.x < -2) s.x = cvs.width + 2;
      if (s.x > cvs.width + 2) s.x = -2;
      var al = (0.25 + 0.75 * Math.abs(Math.sin(t * s.tw * 60 + s.phase))) * s.a;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(' + s.col[0] + ',' + s.col[1] + ',' + s.col[2] + ',' + al.toFixed(3) + ')';
      ctx.fill();
      if (li === 2 && s.r > 1.5) {
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r * 2.5, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(' + s.col[0] + ',' + s.col[1] + ',' + s.col[2] + ',' + (al * 0.15).toFixed(3) + ')';
        ctx.fill();
      }
    }
  }
  requestAnimationFrame(drawStars);
}
drawStars();

// Shooting stars
var sskf = document.createElement('style');
sskf.textContent = '@keyframes ss{0%{opacity:1;transform:translateX(0) translateY(0)}100%{opacity:0;transform:translateX(220px) translateY(110px)}}';
document.head.appendChild(sskf);
setInterval(function() {
  var e = document.createElement('div');
  var top  = Math.random() * window.innerHeight * 0.7;
  var left = Math.random() * window.innerWidth  * 0.75;
  var len  = Math.random() * 100 + 50;
  var dur  = (0.5 + Math.random() * 0.8).toFixed(2);
  e.style.cssText = 'position:fixed;pointer-events:none;z-index:1;top:' + top + 'px;left:' + left + 'px;width:' + len + 'px;height:1.5px;background:linear-gradient(90deg,rgba(167,139,250,.9),transparent);border-radius:2px;animation:ss ' + dur + 's linear forwards;';
  document.body.appendChild(e);
  setTimeout(function() { e.remove(); }, dur * 1000 + 200);
}, 2600);

// ══ APP ══
var API = '/api';
var selQ = null;
var selFmt_ = 'mp4';
var vdata = null;

var QM = {
  '4K':   {l:'Ultra HD', b:'HDR', bc:'hdr'},
  '1440p':{l:'2K QHD',   b:'HD',  bc:'hd'},
  '1080p':{l:'Full HD',  b:'HD',  bc:'hd'},
  '720p': {l:'HD Ready', b:'HD',  bc:'hd'},
  '480p': {l:'Standard', b:'SD',  bc:'sd'},
  '360p': {l:'Niska',    b:'SD',  bc:'sd'},
  '240p': {l:'Mobilna',  b:'SD',  bc:'sd'}
};
var AQ = ['320 kbps','256 kbps','192 kbps','128 kbps'];

// Backend check
function checkBackend() {
  var note = document.getElementById('note');
  note.textContent = '⏳ Łączę z backendem…';
  note.style.color = '';
  fetch(API + '/ping')
    .then(function(r) {
      if (r.ok) {
        note.textContent = '✅ Backend połączony!';
        note.style.color = '#86efac';
      } else {
        throw new Error('not ok');
      }
    })
    .catch(function() {
      note.textContent = '⚠️ Backend offline — sprawdź logi TostHost';
      note.style.color = '#fca5a5';
      setTimeout(checkBackend, 10000);
    });
}
checkBackend();

function setS(t) { document.getElementById('stxt').textContent = t; }
function wait(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }

function showEl(id) { document.getElementById(id).classList.add('on'); }
function hideEl(id) { document.getElementById(id).classList.remove('on'); }

function shake(el) {
  el.style.borderColor = '#c026d3';
  el.style.boxShadow   = '0 0 0 3px rgba(192,38,211,.2)';
  setTimeout(function() { el.style.borderColor = ''; el.style.boxShadow = ''; }, 900);
}

function fmtDur(s) {
  if (!s) return '?';
  if (s < 60) return s + 's';
  var m = Math.floor(s / 60), sc = s % 60;
  if (m < 60) return m + ':' + String(sc).padStart(2,'0');
  var h = Math.floor(m / 60), mn = m % 60;
  return h + ':' + String(mn).padStart(2,'0') + ':' + String(sc).padStart(2,'0');
}

async function analyzeVideo() {
  var url = document.getElementById('urlInput').value.trim();
  if (!url) { shake(document.getElementById('urlInput')); return; }

  var btn = document.getElementById('scanBtn');
  btn.disabled = true;
  hideEl('vinfo'); hideEl('qsec'); hideEl('prog');
  var dlbtn = document.getElementById('dlbtn');
  dlbtn.classList.remove('on'); dlbtn.style.display = 'none';
  selQ = null;

  showEl('sbar'); setS('Analizuję link…');

  try {
    setS('Pobieranie informacji o wideo…');
    var res = await fetch(API + '/info', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({url: url})
    });
    if (!res.ok) {
      var err = {error: 'Błąd serwera ' + res.status};
      try { err = await res.json(); } catch(e) {}
      throw new Error(err.error || 'Błąd serwera');
    }
    vdata = await res.json();
    if (vdata.error) throw new Error(vdata.error);
  } catch(err) {
    hideEl('sbar');
    var note = document.getElementById('note');
    note.textContent = '❌ ' + err.message;
    note.style.color = '#fca5a5';
    btn.disabled = false;
    return;
  }

  hideEl('sbar');
  renderInfo(vdata);
  renderQ(vdata);
  btn.disabled = false;
}

function renderInfo(v) {
  document.getElementById('thumbImg').src = v.thumbnail || v.thumb || '';
  document.getElementById('vtitle').textContent = v.title || '';
  document.getElementById('sbadge').style.display = v.isShorts ? 'block' : 'none';
  var t = document.getElementById('vtags');
  t.innerHTML = '';
  if (v.isShorts) t.innerHTML += '<span class="tag sh">📱 Shorts</span>';
  t.innerHTML += '<span class="tag dur">⏱ ' + fmtDur(v.duration) + '</span>';
  var maxR = Array.isArray(v.resolutions) ? v.resolutions[0] : '?';
  t.innerHTML += '<span class="tag">📺 Max ' + maxR + '</span>';
  showEl('vinfo');
}

function renderQ(v) {
  var g = document.getElementById('qgrid');
  var lbl = document.getElementById('qlabel');
  g.innerHTML = '';
  if (selFmt_ === 'mp3') {
    lbl.textContent = 'Jakość audio';
    AQ.forEach(function(q) {
      var b = document.createElement('div');
      b.className = 'qbtn';
      b.innerHTML = '<div class="qi"><span class="qr">' + q.split(' ')[0] + '</span><span class="ql">' + q.split(' ')[1] + '</span><span class="qb hd">AUDIO</span></div>';
      b.onclick = function() { pickQ(b, q); };
      g.appendChild(b);
    });
  } else {
    lbl.textContent = 'Rozdzielczość';
    (v.resolutions || []).forEach(function(r) {
      var m = QM[r] || {l:r, b:'', bc:'sd'};
      var b = document.createElement('div');
      b.className = 'qbtn';
      b.innerHTML = '<div class="qi"><span class="qr">' + r + '</span><span class="ql">' + m.l + '</span>' + (m.b ? '<span class="qb ' + m.bc + '">' + m.b + '</span>' : '') + '</div>';
      b.onclick = function() { pickQ(b, r); };
      g.appendChild(b);
    });
  }
  showEl('qsec');
}

function pickQ(el, val) {
  document.querySelectorAll('.qbtn').forEach(function(b) { b.classList.remove('sel'); });
  el.classList.add('sel');
  selQ = val;
  var d = document.getElementById('dlbtn');
  d.style.display = 'flex'; d.classList.add('on');
}

function selFmt(el) {
  document.querySelectorAll('.fbtn').forEach(function(b) { b.classList.remove('act'); });
  el.classList.add('act');
  selFmt_ = el.dataset.fmt;
  selQ = null;
  var d = document.getElementById('dlbtn');
  d.classList.remove('on'); d.style.display = 'none';
  if (vdata) renderQ(vdata);
}

async function startDownload() {
  if (!selQ) return;
  var url = document.getElementById('urlInput').value.trim();
  var d = document.getElementById('dlbtn');
  d.style.display = 'none';
  showEl('prog');
  var fill  = document.getElementById('pfill');
  var pct   = document.getElementById('ppct');
  var lbl   = document.getElementById('plabel');

  fill.style.width = '10%'; pct.textContent = '10%'; lbl.textContent = 'Łączenie z serwerem…';

  try {
    var response = await fetch(API + '/download', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({url: url, quality: selQ, format: selFmt_})
    });
    if (!response.ok) {
      var err = {error: 'Błąd ' + response.status};
      try { err = await response.json(); } catch(e) {}
      throw new Error(err.error || 'Błąd pobierania');
    }
    fill.style.width = '70%'; pct.textContent = '70%'; lbl.textContent = 'Pobieranie pliku…';
    var blob = await response.blob();
    fill.style.width = '100%'; pct.textContent = '100%'; lbl.textContent = 'Gotowe! ✓';
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    var ext = selFmt_ === 'mp3' ? 'mp3' : selFmt_ === 'webm' ? 'webm' : 'mp4';
    a.download = ((vdata && vdata.title ? vdata.title.slice(0,40) : 'video') + '_' + selQ + '.' + ext).replace(/[^\w\-_. ]/g,'_');
    a.click();
  } catch(err) {
    lbl.textContent = '❌ ' + err.message;
    pct.textContent = '';
  }

  await wait(3000);
  hideEl('prog');
  fill.style.width = '0%';
  d.style.display = 'flex'; d.classList.add('on');
}

document.getElementById('urlInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') analyzeVideo();
});
</script>
